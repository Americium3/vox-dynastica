name: CI

# Run on every push to any branch + every PR targeting main. Pull requests
# fail if either job fails; that's wired up via branch-protection rules on
# the repo (see docs/CONTRIBUTING.md for the rule list).
on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

# Cancel in-flight runs when a new commit lands on the same ref. Saves
# minutes on rebase storms; safe because each commit triggers its own run.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install ruff
        run: pip install "ruff>=0.5"
      - name: ruff check
        run: ruff check src tests scripts

  test:
    name: pytest (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # 3.11 is the project floor (declared in pyproject); 3.12 catches
        # forward-compat regressions cheaply.
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install package + dev extras
        run: pip install -e ".[dev]"
      - name: pytest
        run: pytest -q
